<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Validation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

input[type="submit"]{
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:20px;
}

input[type="submit"]:hover{
    background:#0056b3;
}

#error{
    color:red;
    margin-top:15px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form id="myForm">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email</label>
        <input type="text" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">

        <input type="submit" value="Register">
    </form>

    <p id="error"></p>
</div>

<script src="script.js"></script>

</body>
</html>
